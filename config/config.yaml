# @package _global_
# primary config file for experiments

defaults:
  - _self_
  - env: cvrp50_unf
  - model: fpin
  - meta: run
  - override hydra/job_logging: simple
#  - mk: mk3
#  - hp_override: none
#  - override hydra/job_logging: simple

hydra:
  # standard output path
  # Prefix is taken from $FPIN_OUTPUT_ROOT if set, else "outputs" (local default).
  # On GWDG, RunJobs export FPIN_OUTPUT_ROOT=$PROJ/fpin_outputs so checkpoints land
  # on the project filesystem instead of $HOME (60 GiB soft quota). Also overridable
  # at the CLI: hydra.run.dir=XXX
  run:
    dir: ${oc.env:FPIN_OUTPUT_ROOT,outputs}/${out_name}/${run_type}/${model}/${now:%Y-%m-%d_%H-%M-%S}
  job:
    chdir: True
  # version_base: "1.2"

  # overwrite root log level
  job_logging:
    root:
      level: ${log_lvl}

  #
  # help flag output. customize for application
  help:
    # App name, override to match the name your app is known by
    app_name: ${hydra.job.name}.py - train or evaluate specified models according to config.