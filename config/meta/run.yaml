# @package _global_

# tensorboard --host localhost --port 8080 --logdir=./outputs

run_type: "val"
number_runs: 1
debug_lvl: 0  # 0 disables debugging and verbosity completely, >1 activates additional debugging functionality
global_seed: 1234
cuda: True
# eGPU GeForce RTX 3060 (G3DMark Mark: 17177, G2DMark: 975)
G3DMark: 17177
G2DMark: 975
# DELL Machine (Intel® Core™ i7-10850H - 12 Threads): 11980
# DELL Machine (Intel® Core™ i7-10850H - 1 Threads): 2714
CPU_Mark_single: 2714
CPU_Mark: 11980
number_threads: 12
number_cpus: 6

test_cfg:
  eval_type: simple  # 'simple', 'wrap', 'pi', ['pi', 'wrap']
  time_limit: 10
  save_solutions: False   # either save solution in log dir of run output dir
  save_for_analysis: True # or save solutions for further analysis in saved results folder
  saved_res_dir: outputs/saved_results # where results for analysis should be saved
  out_name: ${out_name}
  save_trajectory: True   # will always be saved in log dir of run output dir
  save_traj_for:  # IDs of Instances to plot in list - if None, first instance in dataset is plotted
  fixed_dataset: True
  data_file_path: ${data_file_path} # depends on distribution --> env config
  dataset_size: # to overwrite the number of instances to be tested in fixed test set (first 5 instances)
  dataset_range: # solve range of dataset , e.g. [10, 20]
  checkpoint_load_path: ${checkpoint_load_path}
  eval_batch_size: 1
  use_distill: False # True           # decode heatmap with HGS in test --> generate seeds from heatmap
  add_ls: True  # boolean to add local search (spec in 'ls_policy_cfg') after construction
  ls_policy_cfg:
     local_search_strategy: 'GUIDED_LOCAL_SEARCH' # 'SIMULATED_ANNEALING' #'SIMULATED_ANNEALING' #'GUIDED_LOCAL_SEARCH'
     solution_limit: #None
     verbose: False
     log_search: False
     batch_size: 8
     search_workers: 1  # only possible to parallelize search if cp_sat solver is enabled in GORT LS


# important model run options
# eval options
eval_opts_cfg:
  post_process: False #  - per instance post-process ${test_cfg.add_ls} # True # only workds if add_ls is True
  repair_greedy: False # False --> here no vehicle slack! nr_vehicles_eval needs to match M input to model
  giant_tour_split: False # True  # --> either this or repair_greedy needs to be True
  decode_vehicle_assignment: True # --> either this or giant_tour_split or epair_greedy needs to be True
  decode_v_assign_type: assign_plain # assign_plain | assign_faithful (Y_k-faithful, no geometry) | else -> v2
  faithful_beam_width: 1        # 1 = greedy over learned edges; >1 = beam search
  faithful_pooled_order: False  # False = per-vehicle Y_m ordering; True = pooled max_m Y (GT+split signal)
  coords_dist: ${coords_dist}
  guarantee_solution: False # True
  nr_vehicles: ${env_kwargs.sampling_args.k}
  nr_vehicles_eval: ${env_kwargs.sampling_args.k}
  random_perm: False  # decoding random permutation of routes or test every permutation
  no_progress_bar: False
  OR_baseline: HGS
  sbs_decode: # fast # ${model_cfg.model_args.seed_mode}
  use_distill: ${test_cfg.use_distill} # decode heatmap with HGS in test --> generate seeds from heatmap
  ls_policy_cfg: # ignored --> in pim.py --> so take ls_policy constructed in runners
    local_search_strategy: 'GUIDED_LOCAL_SEARCH' #'SIMULATED_ANNEALING' #'GUIDED_LOCAL_SEARCH'
    solution_limit: #None
    verbose: False
    log_search: False
    batch_size: 8
    search_workers: 1  # only possible to parallelize search if cp_sat solver is enabled in GORT LS

  # eval_batch_size: ${test_cfg.eval_batch_size}
  # max_calc_batch_size: 10000
  # compress_mask: True
  # softmax_temperature: 1

train_cfg:
  batch_size: ${test_cfg.eval_batch_size}   # to overwrite regret batches parameter in model_cfg

# global paths and logging
log_lvl: INFO
tb_log_path: 'logs/tb/'
log_path: 'logs/'
checkpoint_save_path: 'checkpoints/'


